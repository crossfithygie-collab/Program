<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HYGIE® TRACKER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { background:#d4d0c8; color:#111; font-family:‘IBM Plex Mono’,monospace; min-height:100vh; overscroll-behavior:none; }

/* ── WIN98 BASE ── */
.win { background:#e8e4dc; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #808080; border-bottom:2px solid #808080; }
.vbar { background:linear-gradient(90deg,#3b23a8,#6b5fd4); padding:4px 8px; display:flex; align-items:center; justify-content:space-between; user-select:none; }
.vbar-t { color:#fff; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.vbtns { display:flex; gap:2px; }
.vbtn { width:16px; height:14px; background:#d4d0c8; border-top:1px solid #fff; border-left:1px solid #fff; border-right:1px solid #808080; border-bottom:1px solid #808080; font-size:9px; display:flex; align-items:center; justify-content:center; }

/* ── HEADER ── */
.hdr { position:sticky; top:0; z-index:100; }
.title-bar { background:linear-gradient(90deg,#3b23a8,#6b5fd4); padding:6px 12px; display:flex; align-items:center; justify-content:space-between; }
.app-name { color:#fff; font-size:13px; font-weight:700; letter-spacing:3px; }
.app-pct { color:rgba(255,255,255,.85); font-size:10px; letter-spacing:2px; }

/* week mini */
.wm-wrap { border-bottom:2px solid #808080; }
.wm-bar { background:linear-gradient(90deg,#3b23a8,#6b5fd4); padding:3px 8px; display:flex; align-items:center; justify-content:space-between; }
.wm-bar span { color:#fff; font-size:9px; letter-spacing:2px; text-transform:uppercase; }
.wm-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; padding:5px; background:#d4d0c8; }
.wm-cell { background:#e8e4dc; border-top:1px solid #fff; border-left:1px solid #fff; border-right:1px solid #808080; border-bottom:1px solid #808080; padding:3px 2px; text-align:center; cursor:pointer; }
.wm-cell.today { background:#3b23a8; }
.wm-cell.today .wm-d, .wm-cell.today .wm-n { color:#fff; }
.wm-d { font-size:7px; letter-spacing:1px; text-transform:uppercase; color:#666; display:block; }
.wm-n { font-size:12px; font-weight:700; color:#000; display:block; margin-top:1px; }
.wm-dots { display:flex; justify-content:center; gap:1px; margin-top:2px; }
.wm-dot { width:3px; height:3px; border-radius:50%; background:#aaa; }
.wm-dot.ok { background:#3b23a8; }

/* day nav */
.day-nav { background:#d4d0c8; border-bottom:2px solid #808080; padding:8px 12px; display:flex; align-items:center; gap:10px; }
.arrow { width:32px; height:28px; background:#e8e4dc; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #808080; border-bottom:2px solid #808080; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; flex-shrink:0; }
.arrow:active { border-top:2px solid #808080; border-left:2px solid #808080; border-right:2px solid #fff; border-bottom:2px solid #fff; }
.day-info { flex:1; text-align:center; }
.day-name { font-size:16px; font-weight:700; letter-spacing:3px; display:block; }
.day-date { font-size:10px; letter-spacing:2px; color:#666; display:block; margin-top:2px; }

/* progress */
.prog-sec { background:#d4d0c8; padding:6px 12px 8px; border-bottom:1px solid #808080; }
.prog-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#666; margin-bottom:4px; display:flex; justify-content:space-between; }
.prog-out { background:#a8a4a0; height:12px; border-top:1px solid #808080; border-left:1px solid #808080; border-right:1px solid #fff; border-bottom:1px solid #fff; overflow:hidden; }
.prog-in { height:100%; background:linear-gradient(90deg,#3b23a8,#6b5fd4); transition:width .4s; }

/* ── CONTENT ── */
.content { padding:8px; padding-bottom:30px; }

/* stats */
.sg { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; padding:10px; }
.sb { background:#d4d0c8; border-top:1px solid #808080; border-left:1px solid #808080; border-right:1px solid #fff; border-bottom:1px solid #fff; padding:8px 4px; text-align:center; }
.sv { font-size:20px; font-weight:700; line-height:1; color:#3b23a8; }
.sl { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:#666; margin-top:3px; }

/* ── SESSION CARD ── */
.sess { margin-bottom:7px; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #808080; border-bottom:2px solid #808080; }

/* bar per type */
.t-halte .s-bar { background:linear-gradient(90deg,#7a5500,#c9a020); }
.t-force  .s-bar { background:linear-gradient(90deg,#7a2000,#dd5522); }
.t-zone2  .s-bar { background:linear-gradient(90deg,#1a0870,#6b5fd4); }
.t-gym    .s-bar { background:linear-gradient(90deg,#3a0870,#8b2fc9); }
.t-wod    .s-bar { background:linear-gradient(90deg,#550000,#cc2200); }
.t-mob    .s-bar { background:linear-gradient(90deg,#002810,#007744); }

.s-bar { padding:4px 8px; display:flex; align-items:center; justify-content:space-between; }
.s-bar-l { color:#fff; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.s-bar-r { display:flex; align-items:center; gap:5px; }

/* STATS badge — only on halte/zone2/wod */
.a-badge {
background:rgba(255,255,255,.25);
border:1px solid rgba(255,255,255,.5);
color:#fff;
font-size:8px; font-weight:700;
letter-spacing:1px; text-transform:uppercase;
font-family:‘IBM Plex Mono’,monospace;
padding:3px 8px;
cursor:pointer;
/* important: prevent text selection on mobile */
user-select:none;
-webkit-user-select:none;
}

/* body = tap zone for toggle */
.s-body {
background:#e8e4dc;
padding:10px;
display:flex; align-items:flex-start; gap:10px;
cursor:pointer;
user-select:none;
-webkit-user-select:none;
}
.s-body:active { background:#ccc8c0; }
.sess.checked .s-body { background:#d0ccc4; }
.sess.checked .s-title { text-decoration:line-through; color:#888; }

.s-info { flex:1; min-width:0; }
.s-tag { display:inline-block; font-size:8px; letter-spacing:2px; text-transform:uppercase; background:#d4d0c8; border-top:1px solid #808080; border-left:1px solid #808080; border-right:1px solid #fff; border-bottom:1px solid #fff; padding:2px 6px; color:#666; margin-bottom:6px; }
.s-title { font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#000; margin-bottom:4px; line-height:1.2; }
.s-detail { font-size:10px; color:#666; line-height:1.5; }

.chk { width:20px; height:20px; background:#fff; border-top:2px solid #808080; border-left:2px solid #808080; border-right:2px solid #fff; border-bottom:2px solid #fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.chk-mark { font-size:15px; font-weight:700; color:#3b23a8; display:none; }
.sess.checked .chk-mark { display:block; }

/* repos */
.repos-body { background:#e8e4dc; padding:20px; text-align:center; }
.repos-l { font-size:14px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:#aaa; }
.repos-s { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#bbb; margin-top:6px; }

/* rule */
.rule-body { background:#e8e4dc; padding:10px 12px; }
.rule-txt { font-size:9px; color:#666; line-height:1.6; }

/* ── MODAL ── */
.m-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:600; display:flex; align-items:flex-end; }
.m-overlay.hidden { display:none; }
.m-win { width:100%; max-height:88vh; overflow-y:auto; background:#e8e4dc; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #808080; }
.m-bar { padding:5px 8px; display:flex; align-items:center; justify-content:space-between; }
.m-bar-t { color:#fff; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.m-body { padding:10px; }

.a-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:12px; }
.a-card { background:#d4d0c8; border-top:2px solid #808080; border-left:2px solid #808080; border-right:2px solid #fff; border-bottom:2px solid #fff; padding:10px 6px; text-align:center; }
.a-val { font-size:26px; font-weight:700; line-height:1; }
.a-lbl { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:#666; margin-top:4px; }

.h-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#666; margin:12px 0 6px; }
.h-dow { display:flex; gap:3px; margin-bottom:3px; }
.h-pad { width:18px; flex-shrink:0; }
.h-d { flex:1; text-align:center; font-size:7px; color:#666; }
.h-weeks { display:flex; flex-direction:column; gap:3px; }
.h-week { display:flex; gap:3px; align-items:center; }
.h-wn { width:18px; font-size:7px; color:#666; flex-shrink:0; }
.h-days { display:flex; gap:3px; flex:1; }
.h-day { flex:1; aspect-ratio:1; border-top:1px solid #808080; border-left:1px solid #808080; border-right:1px solid #fff; border-bottom:1px solid #fff; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; }
.h-day.full { background:#3b23a8; color:#fff; }
.h-day.part { background:#6b5fd4; color:#fff; }
.h-day.miss { background:#b0aca4; color:#888; }
.h-day.fut  { background:#d8d4cc; color:transparent; }
.h-day.rest { background:#cac6be; color:#bbb; font-size:6px; }
.h-day.now  { outline:2px solid #cc2200; outline-offset:-2px; }

.p-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#666; margin:12px 0 6px; }
.p-pips { display:flex; flex-wrap:wrap; gap:3px; }
.p-pip { width:16px; height:16px; border-top:1px solid #808080; border-left:1px solid #808080; border-right:1px solid #fff; border-bottom:1px solid #fff; background:#ccc8c0; }
.p-pip.hit { background:#3b23a8; }
.p-pip.mis { background:#b0aca4; }
.p-leg { display:flex; gap:12px; margin-top:8px; font-size:8px; color:#666; }
.p-leg span { display:flex; align-items:center; gap:4px; }
.p-leg i { display:inline-block; width:10px; height:10px; }

.m-close { display:block; width:100%; background:#d4d0c8; border-top:2px solid #fff; border-left:2px solid #fff; border-right:2px solid #808080; border-bottom:2px solid #808080; font-family:‘IBM Plex Mono’,monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; padding:13px; cursor:pointer; color:#000; font-weight:700; margin-top:8px; }
.m-close:active { border-top:2px solid #808080; border-left:2px solid #808080; border-right:2px solid #fff; border-bottom:2px solid #fff; }
</style>

</head>
<body>

<div class="hdr">
  <div class="title-bar">
    <div class="app-name">HYGIE® TRACKER</div>
    <div class="app-pct" id="gPct">0% PROGRAMME</div>
  </div>
  <div class="wm-wrap">
    <div class="wm-bar"><span>📅 SEMAINE EN COURS</span><div class="vbtns"><div class="vbtn">_</div><div class="vbtn">✕</div></div></div>
    <div class="wm-grid" id="wmGrid"></div>
  </div>
  <div class="day-nav">
    <div class="arrow" id="btnPrev">◄</div>
    <div class="day-info">
      <span class="day-name" id="dayName">—</span>
      <span class="day-date" id="dayDate">—</span>
    </div>
    <div class="arrow" id="btnNext">►</div>
  </div>
  <div class="prog-sec">
    <div class="prog-lbl"><span>PROGRESSION DU JOUR</span><span id="dayPct">0/0</span></div>
    <div class="prog-out"><div class="prog-in" id="dayBar" style="width:0%"></div></div>
  </div>
</div>

<div class="content" id="main"></div>

<div class="m-overlay hidden" id="mOverlay">
  <div class="m-win" id="mWin">
    <div class="m-bar" id="mBar">
      <span class="m-bar-t" id="mTitle">ANALYSE</span>
      <div class="vbtns"><div class="vbtn" onclick="closeModal()">✕</div></div>
    </div>
    <div class="m-body" id="mBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
var MONTHS = ['JANVIER','FÉVRIER','MARS','AVRIL','MAI','JUIN','JUILLET','AOÛT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DÉCEMBRE'];
var DAYS_FR = ['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
var DAYS_FULL = ['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
var START = new Date(2026,2,16);

var SCH = {
  1:{s:[
    {t:'MATIN',n:'SNATCH TECHNIQUE',d:'Primer · Low Hang Snatch · 65→72% · 6-8 sets',tp:'halte'},
    {t:'MATIN',n:'BACK SQUAT PAUSE',d:'4×4 · 65→75% · GHD Hip Extension',tp:'force'},
    {t:'SOIR · MIN. 6H',n:'ZONE 2 BIKEERG',d:'45 min · FC stable · conversation possible',tp:'zone2'}
  ]},
  2:{s:[
    {t:'MATIN',n:'CLEAN & JERK TECHNIQUE',d:'Primer · Low Hang C&J · 65→72% · 6-8 sets',tp:'halte'},
    {t:'MATIN',n:'STRICT PRESS + TRACTION',d:'4×5 press · Pendlay Row · stabilisateurs',tp:'force'},
    {t:'SOIR · MIN. 6H',n:'ZONE 2 ROWER',d:'45 min · ~2:45/500m · FC stricte',tp:'zone2'}
  ]},
  3:{s:[
    {t:'MATIN',n:'GYMNASTICS STRICT',d:'Pull up lesté · Strict HSPU · Ring Dips',tp:'gym'},
    {t:'SOIR · MIN. 6H',n:'WOD SEUIL',d:'7/10 · 20-25 min · rythme constant',tp:'wod'}
  ]},
  4:{s:[
    {t:'MATIN',n:'MOBILITÉ',d:'Hanches · épaules · thoracique · 25-30 min',tp:'mob'},
    {t:'SOIR',n:'ZONE 2 LONGUE ★',d:'60 min · BikeErg ou Rower · session la plus longue',tp:'zone2'}
  ]},
  5:{s:[
    {t:'MATIN',n:'SNATCH OU C&J',d:'Alterné lun/mar · même structure primer + blocs',tp:'halte'},
    {t:'MATIN',n:'BACK SQUAT MAINTIEN',d:'3×5 · 70-75% (≈98-105kg) · 15 min',tp:'force'},
    {t:'MATIN',n:'FORCE UPPER',d:'Bench ou Press · accessoire · stabilisateurs',tp:'force'},
    {t:'SOIR · MIN. 6H',n:'GYMNASTICS CAPACITÉ',d:'Kipping · Muscle Up · HSW · sous fatigue',tp:'gym'}
  ]},
  6:{s:[
    {t:'MATIN',n:'WOD MAXIMAL ⚡',d:'9-10/10 · seul effort compétitif · libre',tp:'wod'},
    {t:'SOIR · MIN. 6H',n:'ZONE 2 FLUSH',d:'30 min · très facile · flush métabolique',tp:'zone2'}
  ]},
  0:null
};

var TLAB = {halte:'⚡ HALTÉRO',force:'💪 FORCE',zone2:'🔵 ZONE 2',gym:'🤸 GYMNASTICS',wod:'🔥 WOD',mob:'🌿 MOBILITÉ'};
var ACOL = {halte:'#8a5e00',zone2:'#3b23a8',wod:'#880000'};
var AICO = {halte:'⚡',zone2:'🔵',wod:'🔥'};
var ALAB = {halte:'HALTÉRO',zone2:'ZONE 2',wod:'WOD'};
var ANAL = ['halte','zone2','wod'];

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
var state = {};
var cur = new Date(); cur.setHours(0,0,0,0);

function load(){ try{ var s=localStorage.getItem('hygie_rad'); if(s) state=JSON.parse(s); }catch(e){} }
function save(){ try{ localStorage.setItem('hygie_rad',JSON.stringify(state)); }catch(e){} }
function dk(d){ return d.getFullYear()+'_'+d.getMonth()+'_'+d.getDate(); }
function sk(d,i){ return dk(d)+'_'+i; }
function isChk(d,i){ return !!state[sk(d,i)]; }

function tog(d,i){
  state[sk(d,i)] = !state[sk(d,i)];
  save();
  renderAll();
}

function getDow(d){ return SCH[d.getDay()]||null; }

function sameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function fmtDate(d){
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}

function getMon(d){
  var dw=d.getDay(), diff=dw===0?-6:1-dw;
  var m=new Date(d); m.setDate(d.getDate()+diff); m.setHours(0,0,0,0); return m;
}

function dayStats(d){
  var D=getDow(d); if(!D) return{tot:0,done:0};
  var done=0; D.s.forEach(function(_,i){ if(isChk(d,i)) done++; });
  return{tot:D.s.length,done:done};
}

function globalPct(){
  var today=new Date(); today.setHours(0,0,0,0);
  var tot=0,done=0,dd=new Date(START);
  while(dd<=today){
    var D=getDow(dd);
    if(D){ D.s.forEach(function(_,i){ tot++; if(isChk(dd,i)) done++; }); }
    dd.setDate(dd.getDate()+1);
  }
  return tot?Math.round(done/tot*100):0;
}

// ─────────────────────────────────────────
// ANALYTICS
// ─────────────────────────────────────────
function buildStats(type){
  var today=new Date(); today.setHours(0,0,0,0);
  var END=new Date(START); END.setDate(START.getDate()+55);
  var tot=0,done=0,curStr=0,bestStr=0,tmp=0,hist=[];
  var dd=new Date(START);
  while(dd<=today && dd<=END){
    var D=getDow(dd);
    if(D){
      var ts=D.s.map(function(s,i){return{s:s,i:i};}).filter(function(x){return x.s.tp===type;});
      if(ts.length){
        tot++;
        var dn=ts.filter(function(x){return isChk(dd,x.i);}).length;
        if(dn>0){done++;tmp++;if(tmp>bestStr)bestStr=tmp;}else tmp=0;
        hist.push({date:new Date(dd),exp:ts.length,done:dn});
      }
    }
    dd.setDate(dd.getDate()+1);
  }
  curStr=tmp;
  return{tot:tot,done:done,rate:tot?Math.round(done/tot*100):0,curStr:curStr,bestStr:bestStr,hist:hist};
}

function buildHeat(type){
  var today=new Date(); today.setHours(0,0,0,0);
  var weeks=[];
  for(var w=0;w<8;w++){
    var wk=[];
    for(var dow=0;dow<7;dow++){
      var d=new Date(START); d.setDate(START.getDate()+w*7+dow);
      var D=getDow(d), st='fut';
      if(d>today) st='fut';
      else if(!D) st='rest';
      else{
        var ts=D.s.map(function(s,i){return{s:s,i:i};}).filter(function(x){return x.s.tp===type;});
        if(!ts.length) st='rest';
        else{
          var dn=ts.filter(function(x){return isChk(d,x.i);}).length;
          st=dn===ts.length?'full':dn>0?'part':'miss';
        }
      }
      wk.push({date:new Date(d),st:st,now:sameDay(d,today)});
    }
    weeks.push(wk);
  }
  return weeks;
}

// ─────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────
function openModal(type){
  var color=ACOL[type], icon=AICO[type], label=ALAB[type];
  var stats=buildStats(type), heat=buildHeat(type);

  document.getElementById('mBar').style.background='linear-gradient(90deg,'+color+','+color+'99)';
  document.getElementById('mTitle').textContent=icon+' RÉGULARITÉ '+label;

  var body=document.getElementById('mBody'); body.innerHTML='';

  // Cards
  var sc=document.createElement('div'); sc.className='a-stats';
  sc.innerHTML='<div class="a-card"><div class="a-val" style="color:'+color+'">'+stats.rate+'%</div><div class="a-lbl">TAUX</div></div>'+
    '<div class="a-card"><div class="a-val" style="color:'+color+'">'+stats.curStr+'</div><div class="a-lbl">STREAK</div></div>'+
    '<div class="a-card"><div class="a-val" style="color:'+color+'">'+stats.done+'/'+stats.tot+'</div><div class="a-lbl">FAIT/PRÉVU</div></div>';
  body.appendChild(sc);

  // Heatmap
  var hl=document.createElement('div'); hl.className='h-lbl'; hl.textContent='🗓 CALENDRIER 8 SEMAINES'; body.appendChild(hl);
  var dr=document.createElement('div'); dr.className='h-dow';
  dr.innerHTML='<div class="h-pad"></div>'+['L','M','M','J','V','S','D'].map(function(x){return'<div class="h-d">'+x+'</div>';}).join('');
  body.appendChild(dr);
  var hw=document.createElement('div'); hw.className='h-weeks';
  heat.forEach(function(wk,wi){
    var row=document.createElement('div'); row.className='h-week';
    row.innerHTML='<div class="h-wn">S'+(wi+1)+'</div>';
    var days=document.createElement('div'); days.className='h-days';
    wk.forEach(function(cell){
      var c=document.createElement('div');
      c.className='h-day '+cell.st+(cell.now?' now':'');
      c.textContent=cell.date.getDate();
      days.appendChild(c);
    });
    row.appendChild(days); hw.appendChild(row);
  });
  body.appendChild(hw);

  // Pips
  if(stats.hist.length){
    var pl=document.createElement('div'); pl.className='p-lbl'; pl.textContent='📈 HISTORIQUE'; body.appendChild(pl);
    var pp=document.createElement('div'); pp.className='p-pips';
    stats.hist.forEach(function(h){
      var p=document.createElement('div'); p.className='p-pip '+(h.done>0?'hit':'mis'); pp.appendChild(p);
    });
    body.appendChild(pp);
    var leg=document.createElement('div'); leg.className='p-leg';
    leg.innerHTML='<span><i style="background:#3b23a8"></i>FAIT</span><span><i style="background:#b0aca4"></i>MANQUÉ</span>';
    body.appendChild(leg);
  }

  var btn=document.createElement('button'); btn.className='m-close'; btn.textContent='✕ FERMER';
  btn.onclick=function(){ closeModal(); };
  body.appendChild(btn);

  document.getElementById('mOverlay').classList.remove('hidden');
  document.getElementById('mWin').scrollTop=0;
}

function closeModal(){
  document.getElementById('mOverlay').classList.add('hidden');
}

document.getElementById('mOverlay').onclick=function(e){
  if(e.target===this) closeModal();
};

// ─────────────────────────────────────────
// RENDERS
// ─────────────────────────────────────────
function renderWM(){
  var el=document.getElementById('wmGrid'); el.innerHTML='';
  var today=new Date(); today.setHours(0,0,0,0);
  var mon=getMon(cur);
  for(var i=0;i<7;i++){
    var d=new Date(mon); d.setDate(mon.getDate()+i);
    var D=getDow(d);
    var isT=sameDay(d,today), isC=sameDay(d,cur);
    var c=document.createElement('div');
    c.className='wm-cell'+(isT?' today':'');
    if(isC&&!isT){c.style.outline='2px solid #3b23a8';c.style.outlineOffset='-2px';}
    var dots=D?D.s.map(function(_,i){return'<div class="wm-dot'+(isChk(d,i)?' ok':'')+'"></div>';}).join(''):'<div class="wm-dot" style="background:#ddd"></div>';
    c.innerHTML='<span class="wm-d">'+DAYS_FR[d.getDay()]+'</span><span class="wm-n">'+d.getDate()+'</span><div class="wm-dots">'+dots+'</div>';
    (function(dd){ c.onclick=function(){ cur=new Date(dd); cur.setHours(0,0,0,0); renderAll(); }; })(d);
    el.appendChild(c);
  }
}

function renderHdr(){
  document.getElementById('dayName').textContent=DAYS_FULL[cur.getDay()];
  document.getElementById('dayDate').textContent=fmtDate(cur);
  var st=dayStats(cur);
  document.getElementById('dayPct').textContent=st.done+'/'+st.tot+' sessions';
  document.getElementById('dayBar').style.width=(st.tot?Math.round(st.done/st.tot*100):0)+'%';
  document.getElementById('gPct').textContent=globalPct()+'% PROGRAMME';
}

function renderMain(){
  var el=document.getElementById('main'); el.innerHTML='';
  var D=getDow(cur);

  if(!D){
    var r=document.createElement('div'); r.className='sess';
    r.innerHTML='<div class="s-bar" style="background:linear-gradient(90deg,#444,#666)"><span class="s-bar-l">💤 DIMANCHE</span></div><div class="repos-body"><div class="repos-l">REPOS COMPLET</div><div class="repos-s">RÉCUPÉRATION TOTALE · SNC OFF</div></div>';
    el.appendChild(r); return;
  }

  // Bilan
  var st=dayStats(cur);
  var z2=0,hal=0,wod=0;
  D.s.forEach(function(s,i){ if(isChk(cur,i)){ if(s.tp==='zone2')z2++; if(s.tp==='halte')hal++; if(s.tp==='wod')wod++; } });
  var bw=document.createElement('div'); bw.className='win'; bw.style.marginBottom='7px';
  bw.innerHTML='<div class="vbar"><span class="vbar-t">📊 BILAN DU JOUR</span></div><div class="sg"><div class="sb"><div class="sv">'+st.done+'/'+st.tot+'</div><div class="sl">FAIT</div></div><div class="sb"><div class="sv" style="color:#8a5e00">'+hal+'</div><div class="sl">HALTÉRO</div></div><div class="sb"><div class="sv">'+z2+'</div><div class="sl">ZONE 2</div></div><div class="sb"><div class="sv" style="color:#880000">'+wod+'</div><div class="sl">WOD</div></div></div>';
  el.appendChild(bw);

  // Sessions
  D.s.forEach(function(s,si){
    var checked=isChk(cur,si);
    var showA=ANAL.indexOf(s.tp)!==-1;

    var card=document.createElement('div');
    card.className='sess t-'+s.tp+(checked?' checked':'');

    var badgeHTML=showA?'<div class="a-badge" id="ab_'+si+'">📈 STATS</div>':'';

    card.innerHTML=
      '<div class="s-bar">'+
        '<span class="s-bar-l">'+TLAB[s.tp]+'</span>'+
        '<div class="s-bar-r">'+badgeHTML+'<div class="vbtns"><div class="vbtn">✕</div></div></div>'+
      '</div>'+
      '<div class="s-body" id="sb_'+si+'">'+
        '<div class="s-info">'+
          '<div class="s-tag">'+s.t+'</div>'+
          '<div class="s-title">'+s.n+'</div>'+
          '<div class="s-detail">'+s.d+'</div>'+
        '</div>'+
        '<div class="chk"><span class="chk-mark">✓</span></div>'+
      '</div>';

    el.appendChild(card);

    // Attach handlers AFTER appending (so elements exist in DOM)
    // Toggle on body
    var bodyEl=document.getElementById('sb_'+si);
    (function(idx){ 
      bodyEl.onclick=function(){ tog(cur,idx); }; 
    })(si);

    // Analytics badge
    if(showA){
      var badgeEl=document.getElementById('ab_'+si);
      (function(tp){
        badgeEl.onclick=function(e){
          e.stopPropagation();
          openModal(tp);
        };
      })(s.tp);
    }
  });

  // Rule
  var rule=document.createElement('div'); rule.className='win'; rule.style.marginTop='8px';
  rule.innerHTML='<div class="vbar" style="background:linear-gradient(90deg,#444,#666)"><span class="vbar-t">ℹ️ RÈGLE D\'OR</span></div><div class="rule-body"><div class="rule-txt">MIN. 6H ENTRE SESSIONS · FORCE TOUJOURS EN PREMIER<br>SI UNE SESSION SAUTE → TOUJOURS CELLE DU SOIR</div></div>';
  el.appendChild(rule);
}

function renderAll(){ renderHdr(); renderWM(); renderMain(); }

// ─────────────────────────────────────────
// NAV — onclick only, no global touchend
// ─────────────────────────────────────────
document.getElementById('btnPrev').onclick=function(){
  cur=new Date(cur); cur.setDate(cur.getDate()-1); renderAll();
};
document.getElementById('btnNext').onclick=function(){
  cur=new Date(cur); cur.setDate(cur.getDate()+1); renderAll();
};

// Swipe on content area only (not on cards)
var swipeEl=document.getElementById('main');
var swipeStartX=0, swipeStartY=0, swipeMoved=false;

swipeEl.addEventListener('touchstart',function(e){
  swipeStartX=e.changedTouches[0].clientX;
  swipeStartY=e.changedTouches[0].clientY;
  swipeMoved=false;
},{passive:true});

swipeEl.addEventListener('touchmove',function(e){
  var dx=Math.abs(e.changedTouches[0].clientX-swipeStartX);
  var dy=Math.abs(e.changedTouches[0].clientY-swipeStartY);
  if(dx>10||dy>10) swipeMoved=true;
},{passive:true});

swipeEl.addEventListener('touchend',function(e){
  if(!swipeMoved) return; // was a tap, let onclick handle it
  var dx=e.changedTouches[0].clientX-swipeStartX;
  var dy=e.changedTouches[0].clientY-swipeStartY;
  if(Math.abs(dx)>Math.abs(dy)*1.5 && Math.abs(dx)>60){
    if(document.getElementById('mOverlay').classList.contains('hidden')){
      cur=new Date(cur);
      cur.setDate(cur.getDate()+(dx<0?1:-1));
      renderAll();
    }
  }
},{passive:true});

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
load();
cur=new Date(); cur.setHours(0,0,0,0);
renderAll();
</script>
