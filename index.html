<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HYGIE® TRACKER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#d4d0c8;color:#111;font-family:'IBM Plex Mono',monospace;min-height:100vh;}
.hdr{position:sticky;top:0;z-index:100;}
.title-bar{background:linear-gradient(90deg,#3b23a8,#6b5fd4);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;}
.app-name{color:#fff;font-size:13px;font-weight:700;letter-spacing:3px;}
.app-pct{color:rgba(255,255,255,.85);font-size:10px;letter-spacing:2px;}
.wm-bar{background:linear-gradient(90deg,#3b23a8,#6b5fd4);padding:3px 10px;}
.wm-bar-t{color:#fff;font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.wm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:5px;background:#d4d0c8;border-bottom:2px solid #808080;}
.wmc{background:#e8e4dc;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080;padding:4px 2px;text-align:center;cursor:pointer;}
.wmc.today{background:#3b23a8;}
.wmc.today .wmd,.wmc.today .wmn{color:#fff;}
.wmd{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:#666;display:block;}
.wmn{font-size:13px;font-weight:700;color:#000;display:block;margin-top:1px;}
.wmdots{display:flex;justify-content:center;gap:2px;margin-top:3px;}
.wmdot{width:4px;height:4px;border-radius:50%;background:#aaa;}
.wmdot.ok{background:#fff;}
.wmc.today .wmdot{background:rgba(255,255,255,.4);}
.wmc.today .wmdot.ok{background:#fff;}
.daynav{background:#d4d0c8;border-bottom:2px solid #808080;padding:8px 12px;display:flex;align-items:center;gap:10px;}
.arr{width:36px;height:30px;background:#e8e4dc;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;font-weight:700;}
.arr:active{border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;}
.dayinfo{flex:1;text-align:center;}
.dayname{font-size:17px;font-weight:700;letter-spacing:3px;display:block;}
.daydate{font-size:10px;letter-spacing:2px;color:#666;display:block;margin-top:2px;}
.progsec{background:#d4d0c8;padding:6px 12px 8px;border-bottom:1px solid #808080;}
.proglbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-bottom:4px;display:flex;justify-content:space-between;}
.progout{background:#a8a4a0;height:12px;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;overflow:hidden;}
.progin{height:100%;background:linear-gradient(90deg,#3b23a8,#6b5fd4);transition:width .3s;}
.content{padding:8px;padding-bottom:80px;}
.vbar{padding:5px 10px;display:flex;align-items:center;justify-content:space-between;}
.vbar-t{color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px;background:#e8e4dc;}
.sb{background:#d4d0c8;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;padding:8px 4px;text-align:center;}
.sv{font-size:20px;font-weight:700;line-height:1;color:#3b23a8;}
.sl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-top:3px;}
.sess{margin-bottom:8px;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;}
.sess-bar{padding:5px 8px;display:flex;align-items:center;justify-content:space-between;}
.sess-bar-l{color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;pointer-events:none;}
.stats-btn{background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.6);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;cursor:pointer;min-width:60px;min-height:26px;display:flex;align-items:center;justify-content:center;}
.t-halte .sess-bar{background:linear-gradient(90deg,#7a5500,#c9a020);}
.t-force .sess-bar{background:linear-gradient(90deg,#7a2000,#dd5522);}
.t-zone2 .sess-bar{background:linear-gradient(90deg,#1a0870,#6b5fd4);}
.t-gym .sess-bar{background:linear-gradient(90deg,#3a0870,#8b2fc9);}
.t-wod .sess-bar{background:linear-gradient(90deg,#550000,#cc2200);}
.t-mob .sess-bar{background:linear-gradient(90deg,#002810,#007744);}
.sess-body{background:#e8e4dc;padding:12px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.sess-body:active{background:#c8c4bc;}
.sess.checked .sess-body{background:#d0ccc4;}
.sess.checked .sess-title{text-decoration:line-through;color:#999;}
.sess-info{flex:1;}
.sess-tag{display:inline-block;font-size:8px;letter-spacing:2px;text-transform:uppercase;background:#d4d0c8;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;padding:2px 7px;color:#666;margin-bottom:7px;}
.sess-title{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#000;margin-bottom:4px;line-height:1.2;}
.sess-detail{font-size:10px;color:#666;line-height:1.5;}
.chk{width:22px;height:22px;background:#fff;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chkmark{font-size:16px;font-weight:700;color:#3b23a8;display:none;}
.sess.checked .chkmark{display:block;}
.repos-body{background:#e8e4dc;padding:24px;text-align:center;}
.repos-l{font-size:14px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#aaa;}
.repos-s{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#bbb;margin-top:8px;}
.rule-body{background:#e8e4dc;padding:10px 12px;}
.rule-txt{font-size:9px;color:#666;line-height:1.7;}
/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;display:flex;align-items:flex-end;}
.moverlay.hidden{display:none;}
.mwin{width:100%;max-height:90vh;overflow-y:auto;background:#e8e4dc;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;}
.mbar{padding:6px 10px;display:flex;align-items:center;justify-content:space-between;}
.mbar-t{color:#fff;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.mbody{padding:12px;}
.mclose-btn{width:20px;height:18px;background:#d4d0c8;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700;}
.astats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.acard{background:#d4d0c8;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;padding:12px 6px;text-align:center;}
.aval{font-size:28px;font-weight:700;line-height:1;}
.albl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-top:5px;}
.hlbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#666;margin:14px 0 7px;}
.hdow{display:flex;gap:3px;margin-bottom:3px;}
.hpad{width:20px;flex-shrink:0;}
.hd{flex:1;text-align:center;font-size:7px;color:#666;letter-spacing:1px;}
.hweeks{display:flex;flex-direction:column;gap:3px;}
.hweek{display:flex;gap:3px;align-items:center;}
.hwn{width:20px;font-size:7px;color:#666;flex-shrink:0;}
.hdays{display:flex;gap:3px;flex:1;}
.hday{flex:1;aspect-ratio:1;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:transparent;}
.hday.full{background:#3b23a8;color:#fff;}
.hday.part{background:#6b5fd4;color:#fff;}
.hday.miss{background:#b0aca4;color:#888;}
.hday.rest{background:#cac6be;opacity:.25;}
.hday.fut{background:#d8d4cc;}
.hday.now{outline:2px solid #cc2200;outline-offset:-2px;}
.plbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#666;margin:14px 0 7px;}
.ppips{display:flex;flex-wrap:wrap;gap:4px;}
.ppip{width:18px;height:18px;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;background:#ccc8c0;}
.ppip.hit{background:#3b23a8;}
.ppip.mis{background:#b0aca4;}
.pleg{display:flex;gap:14px;margin-top:10px;font-size:8px;color:#666;}
.pleg span{display:flex;align-items:center;gap:5px;}
.pleg i{display:inline-block;width:12px;height:12px;}
.mclose{display:block;width:100%;background:#d4d0c8;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:14px;cursor:pointer;color:#000;font-weight:700;margin-top:10px;}
/* DRAWER */
.drawer-fab{position:fixed;bottom:20px;right:16px;z-index:400;width:52px;height:52px;background:linear-gradient(135deg,#3b23a8,#6b5fd4);border-top:2px solid #8b7fe0;border-left:2px solid #8b7fe0;border-right:2px solid #1a0a60;border-bottom:2px solid #1a0a60;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;}
.drawer-fab:active{border-top:2px solid #1a0a60;border-left:2px solid #1a0a60;border-right:2px solid #8b7fe0;border-bottom:2px solid #8b7fe0;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:410;display:flex;align-items:flex-end;}
.drawer-overlay.hidden{display:none;}
.drawer-win{width:100%;max-height:92vh;overflow-y:auto;background:#d4d0c8;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;}
.drawer-titlebar{background:linear-gradient(90deg,#3b23a8,#6b5fd4);padding:5px 10px;display:flex;align-items:center;justify-content:space-between;}
.drawer-titlebar-t{color:#fff;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.drawer-close{width:20px;height:18px;background:#d4d0c8;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;font-weight:700;}
.dtabs{display:flex;background:#b8b4ac;border-bottom:2px solid #808080;overflow-x:auto;}
.dtab{flex:1;min-width:56px;padding:9px 4px;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;cursor:pointer;color:#666;border:none;background:none;border-right:1px solid #808080;white-space:nowrap;}
.dtab:last-child{border-right:none;}
.dtab.active{background:#d4d0c8;color:#3b23a8;border-bottom:2px solid #d4d0c8;margin-bottom:-2px;}
.dtool{display:none;padding:10px;}
.dtool.active{display:block;}
.win-input{width:100%;background:#fff;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#111;padding:6px 8px;}
.win-input::placeholder{color:#aaa;}
.win-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:4px;margin-top:10px;display:block;}
.win-row{display:flex;gap:6px;margin-bottom:6px;align-items:flex-end;}
.win-btn-primary{display:block;width:100%;background:#3b23a8;border-top:2px solid #6b5fd4;border-left:2px solid #6b5fd4;border-right:2px solid #1a0a60;border-bottom:2px solid #1a0a60;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:9px 14px;cursor:pointer;color:#fff;margin-top:8px;}
.win-btn-primary:active{border-top:2px solid #1a0a60;border-left:2px solid #1a0a60;border-right:2px solid #6b5fd4;border-bottom:2px solid #6b5fd4;}
.radio-group{display:flex;}
.radio-btn{flex:1;padding:7px 4px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:#d4d0c8;border-top:2px solid #fff;border-left:2px solid #fff;border-right:1px solid #808080;border-bottom:2px solid #808080;color:#666;}
.radio-btn:last-child{border-right:2px solid #808080;}
.radio-btn.active{background:#3b23a8;color:#fff;border-top:2px solid #1a0a60;border-left:2px solid #1a0a60;border-right:1px solid #6b5fd4;border-bottom:2px solid #6b5fd4;}
.sect-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#3b23a8;padding:8px 0 4px;border-bottom:1px solid #aaa;margin-bottom:8px;}
.calc-result{background:#e8e4dc;border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #fff;border-bottom:2px solid #fff;padding:10px 12px;margin-top:10px;}
.calc-result-main{font-size:22px;font-weight:700;color:#3b23a8;letter-spacing:1px;}
.calc-result-sub{font-size:10px;color:#555;margin-top:4px;line-height:1.6;}
.pr-item{display:flex;flex-direction:column;align-items:stretch;background:#e8e4dc;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080;margin-bottom:4px;padding:8px;}
.pr-name{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#000;}
.pr-val{font-size:13px;font-weight:700;color:#3b23a8;}
.pr-date{font-size:8px;color:#888;letter-spacing:1px;margin-top:1px;}
.pr-del{background:#d4d0c8;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080;font-size:13px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#880000;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.pr-hist-btn{background:#d4d0c8;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #808080;border-bottom:1px solid #808080;font-size:8px;padding:4px 8px;cursor:pointer;color:#3b23a8;font-weight:700;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;}
.pr-hist{background:#c8c4bc;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #fff;border-bottom:1px solid #fff;padding:6px 8px;margin-top:4px;display:none;}
.pr-hist.open{display:block;}
.pr-hist-row{font-size:9px;color:#333;padding:2px 0;border-bottom:1px solid #b8b4ac;display:flex;justify-content:space-between;}
.plates-visual{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.plate-chip{padding:5px 10px;font-size:10px;font-weight:700;letter-spacing:1px;color:#fff;}
.plates-note{font-size:9px;color:#666;margin-top:6px;letter-spacing:.5px;}

</style>
</head>
<body>

<div class="drawer-fab" id="drawerFab">🛠</div>
<div class="drawer-overlay hidden" id="drawerOverlay">
  <div class="drawer-win">
    <div class="drawer-titlebar">
      <span class="drawer-titlebar-t">🛠 OUTILS</span>
      <div class="drawer-close" id="drawerClose">✕</div>
    </div>
    <div class="dtabs">
      <button class="dtab active" onclick="switchDTab('pr')">🏆 PR</button>
      <button class="dtab" onclick="switchDTab('pct')">% BARRE</button>
      <button class="dtab" onclick="switchDTab('plates')">🏋 PLATES</button>
    </div>
    <div class="dtool active" id="dtool-pr">
      <div class="sect-title">ENREGISTRER UN PR</div>
      <span class="win-label">MOUVEMENT</span>
      <input class="win-input" id="prName" placeholder="Ex: Snatch, Back Squat...">
      <span class="win-label">TYPE</span>
      <div class="radio-group" id="prTypeGroup">
        <div class="radio-btn active" data-val="kg" onclick="setPrType('kg')">KG</div>
        <div class="radio-btn" data-val="reps" onclick="setPrType('reps')">REPS</div>
        <div class="radio-btn" data-val="time" onclick="setPrType('time')">TEMPS</div>
      </div>
      <span class="win-label">VALEUR</span>
      <div class="win-row">
        <input class="win-input" id="prVal" type="number" step="0.25" placeholder="0" style="flex:1">
        <span id="prUnit" style="font-size:11px;font-weight:700;color:#555;padding:8px 4px;">KG</span>
      </div>
      <button class="win-btn-primary" onclick="savePR()">💾 ENREGISTRER</button>
      <div class="sect-title" style="margin-top:14px;">MES PR</div>
      <div id="prList"></div>
    </div>
    <div class="dtool" id="dtool-pct">
      <div class="sect-title">POURCENTAGES BARRE</div>
      <span class="win-label">1RM (KG)</span>
      <input class="win-input" id="pctRM" type="number" step="0.5" placeholder="Ex: 100" oninput="if(this.value)calcPct()">
      <button class="win-btn-primary" onclick="calcPct()">CALCULER</button>
      <div id="pctResult"></div>
    </div>
    <div class="dtool" id="dtool-plates">
      <div class="sect-title">CALCULATEUR DE PLATES</div>
      <span class="win-label">POIDS CIBLE (KG)</span>
      <input class="win-input" id="plTarget" type="number" step="0.25" placeholder="Ex: 80" oninput="if(this.value)calcPlates()">
      <span class="win-label">DÉJÀ SUR LA BARRE — BARRE INCLUSE (0 = VIDE)</span>
      <input class="win-input" id="plLoaded" type="number" step="0.25" placeholder="0" value="0" oninput="if(document.getElementById('plTarget').value)calcPlates()">
      <button class="win-btn-primary" onclick="calcPlates()">CALCULER</button>
      <div id="plResult"></div>
    </div>
  </div>
</div>

<div class="moverlay hidden" id="mOverlay">
  <div class="mwin">
    <div class="mbar" id="mBar">
      <span class="mbar-t" id="mTitle">ANALYSE</span>
      <div class="mclose-btn" id="mCloseX">✕</div>
    </div>
    <div class="mbody" id="mBody"></div>
  </div>
</div>

<div class="hdr">
  <div class="title-bar"><div class="app-name">HYGIE® TRACKER</div><div class="app-pct" id="gPct">0%</div></div>
  <div class="wm-bar"><span class="wm-bar-t">📅 SEMAINE EN COURS</span></div>
  <div class="wm-grid" id="wmGrid"></div>
  <div class="daynav">
    <div class="arr" id="btnPrev">◄</div>
    <div class="dayinfo"><span class="dayname" id="dayName">—</span><span class="daydate" id="dayDate">—</span></div>
    <div class="arr" id="btnNext">►</div>
  </div>
  <div class="progsec">
    <div class="proglbl"><span>PROGRESSION DU JOUR</span><span id="dayPct">0/0</span></div>
    <div class="progout"><div class="progin" id="dayBar" style="width:0%"></div></div>
  </div>
</div>
<div class="content" id="main"></div>

<script>
var MO=['JANVIER','FÉVRIER','MARS','AVRIL','MAI','JUIN','JUILLET','AOÛT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DÉCEMBRE'];
var DFR=['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
var DFL=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
var START=new Date(2026,2,16);

var SCH={
  1:{s:[
    {t:'MATIN',n:'SNATCH TECHNIQUE',d:'65→72% 1RM · 6-8 sets every 1:30 · focus placement bas',tp:'halte'},
    {t:'MATIN',n:'BACK SQUAT',d:'4×4 · 65→75% 1RM · ≈91→105kg · pause 3s en bas',tp:'force'},
    {t:'SOIR · MIN. 6H',n:'ZONE 2 BIKEERG',d:'45 min · FC 130-145 bpm · RPE 3/10 · conversation possible',tp:'zone2'}
  ]},
  2:{s:[
    {t:'MATIN',n:'CLEAN & JERK TECHNIQUE',d:'65→72% 1RM · 6-8 sets every 1:30 · focus réception',tp:'halte'},
    {t:'MATIN',n:'STRICT PRESS + TRACTION',d:'Press 4×5 · 65→75% 1RM ≈45→52kg · Pendlay Row même volume',tp:'force'},
    {t:'SOIR · MIN. 6H',n:'ZONE 2 ROWER',d:'45 min · ~2:45/500m · FC stable sous seuil · RPE 3/10',tp:'zone2'}
  ]},
  3:{s:[
    {t:'MATIN',n:'GYMNASTICS STRICT',d:'Pull up +5kg · HSPU strict 4×5-8 · Ring Dips 3×8 · pas de kipping',tp:'gym'},
    {t:'SOIR · MIN. 6H',n:'WOD SEUIL',d:'Intensité 7/10 · rythme constant maintenu · même débit sur tous les rounds',tp:'wod'}
  ]},
  4:{s:[
    {t:'MATIN',n:'MOBILITÉ',d:'Hanches 90/90 · band work épaules · thoracique · RPE 1/10',tp:'mob'},
    {t:'SOIR',n:'ZONE 2 LONGUE ★',d:'60 min · FC < 145 bpm tout du long · session clé de la semaine',tp:'zone2'}
  ]},
  5:{s:[
    {t:'MATIN',n:'SNATCH OU C&J',d:'Alterné sem A/B · 65→72% 1RM · même structure que lun/mar',tp:'halte'},
    {t:'MATIN',n:'BACK SQUAT MAINTIEN',d:'3×5 · 70-75% 1RM · ≈98→105kg · focus vitesse concentrique',tp:'force'},
    {t:'MATIN',n:'BENCH / STRICT PRESS',d:'Alterné chaque semaine · 4×5 · 70-75% 1RM',tp:'force'},
    {t:'SOIR · MIN. 6H',n:'GYMNASTICS CAPACITÉ',d:'Kipping · Muscle Up · HSW · enchaînements sous légère fatigue',tp:'gym'}
  ]},
  6:{s:[
    {t:'MATIN',n:'WOD MAXIMAL ⚡',d:'Intensité 9-10/10 · seul vrai max de la semaine · format libre',tp:'wod'},
    {t:'SOIR · MIN. 6H',n:'ZONE 2 FLUSH',d:'30 min · RPE 2/10 · élimination métabolique post-WOD',tp:'zone2'}
  ]},
  0:null
};

var TLAB={halte:'⚡ HALTÉRO',force:'💪 FORCE',zone2:'🔵 ZONE 2',gym:'🤸 GYMNASTICS',wod:'🔥 WOD',mob:'🌿 MOBILITÉ'};
var ACOL={halte:'#8a5e00',zone2:'#3b23a8',wod:'#880000',force:'#7a2000',gym:'#3a0870',mob:'#004422'};
var ANAL=['halte','zone2','wod','force','gym','mob'];

var state={};
var cur=new Date();cur.setHours(0,0,0,0);
function load(){try{var s=localStorage.getItem('hygie_v4');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('hygie_v4',JSON.stringify(state));}catch(e){}}
function dk(d){return d.getFullYear()+'_'+d.getMonth()+'_'+d.getDate();}
function sk(d,i){return dk(d)+'_'+i;}
function isC(d,i){return !!state[sk(d,i)];}
function tog(d,i){state[sk(d,i)]=!state[sk(d,i)];save();renderAll();}
function getDow(d){return SCH[d.getDay()]||null;}
function sameD(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fmt(d){return d.getDate()+' '+MO[d.getMonth()]+' '+d.getFullYear();}
function getMon(d){var dw=d.getDay(),df=dw===0?-6:1-dw,m=new Date(d);m.setDate(d.getDate()+df);m.setHours(0,0,0,0);return m;}
function gPct(){
  var today=new Date();today.setHours(0,0,0,0);
  var t=0,d=0,dd=new Date(START);
  while(dd<=today){var D=getDow(dd);if(D){D.s.forEach(function(_,i){t++;if(isC(dd,i))d++;});}dd.setDate(dd.getDate()+1);}
  return t?Math.round(d/t*100):0;
}

// MODAL
function openModal(type){
  var col=ACOL[type];
  var icons={halte:'⚡',zone2:'🔵',wod:'🔥',force:'💪',gym:'🤸',mob:'🌿'};
  var labs={halte:'HALTÉRO',zone2:'ZONE 2',wod:'WOD',force:'FORCE',gym:'GYMNASTICS',mob:'MOBILITÉ'};
  document.getElementById('mBar').style.background='linear-gradient(90deg,'+col+','+col+'aa)';
  document.getElementById('mTitle').textContent=icons[type]+' RÉGULARITÉ '+labs[type];
  var body=document.getElementById('mBody');body.innerHTML='';
  var today=new Date();today.setHours(0,0,0,0);
  var weekPrev=0;
  [0,1,2,3,4,5,6].forEach(function(dow){var D=SCH[dow];if(!D)return;D.s.forEach(function(s){if(s.tp===type)weekPrev++;});});
  var mon=getMon(today);var weekDone=0;
  for(var wi=0;wi<7;wi++){var wd=new Date(mon);wd.setDate(mon.getDate()+wi);var Dw=getDow(wd);if(!Dw)continue;Dw.s.forEach(function(s,i){if(s.tp===type&&isC(wd,i))weekDone++;});}
  var totAll=0,doneAll=0;
  var END=new Date(START);END.setDate(START.getDate()+55);
  var dd=new Date(START);
  while(dd<=today&&dd<=END){var D=getDow(dd);if(D){D.s.forEach(function(s,i){if(s.tp===type){totAll++;if(isC(dd,i))doneAll++;}});}dd.setDate(dd.getDate()+1);}
  var rate=totAll?Math.round(doneAll/totAll*100):0;
  var curStr=0,tmp=0,hist=[];
  var dd2=new Date(START);
  while(dd2<=today&&dd2<=END){
    var D2=getDow(dd2);if(D2){
      var ts2=[];D2.s.forEach(function(s,i){if(s.tp===type)ts2.push({s:s,i:i});});
      if(ts2.length){var dn=0;ts2.forEach(function(x){if(isC(dd2,x.i))dn++;});if(dn>0)tmp++;else tmp=0;hist.push({date:new Date(dd2),done:dn,exp:ts2.length});}
    }
    dd2.setDate(dd2.getDate()+1);
  }
  curStr=tmp;
  function mkCard(val,lbl){var card=document.createElement('div');card.className='acard';var v=document.createElement('div');v.className='aval';v.style.color=col;v.textContent=val;var l=document.createElement('div');l.className='albl';l.textContent=lbl;card.appendChild(v);card.appendChild(l);return card;}
  var sc=document.createElement('div');sc.className='astats';
  sc.appendChild(mkCard(weekDone+'/'+weekPrev,'CETTE SEMAINE'));
  sc.appendChild(mkCard(rate+'%','TAUX GLOBAL'));
  sc.appendChild(mkCard(curStr,'STREAK JOURS'));
  body.appendChild(sc);
  var hl=document.createElement('div');hl.className='hlbl';hl.textContent='🗓 CALENDRIER 8 SEMAINES';body.appendChild(hl);
  var dr=document.createElement('div');dr.className='hdow';
  dr.innerHTML='<div class="hpad"></div>'+['L','M','M','J','V','S','D'].map(function(x){return'<div class="hd">'+x+'</div>';}).join('');
  body.appendChild(dr);
  var hw=document.createElement('div');hw.className='hweeks';
  for(var w=0;w<8;w++){
    var row=document.createElement('div');row.className='hweek';row.innerHTML='<div class="hwn">S'+(w+1)+'</div>';
    var daysEl=document.createElement('div');daysEl.className='hdays';
    for(var dow=0;dow<7;dow++){
      var d=new Date(START);d.setDate(START.getDate()+w*7+dow);
      var Dc=getDow(d);var cell=document.createElement('div');var st;
      if(!Dc){st='rest';}
      else{var tsc=[];Dc.s.forEach(function(s,i){if(s.tp===type)tsc.push({s:s,i:i});});
        if(!tsc.length){st='rest';}
        else{var dnc=0;tsc.forEach(function(x){if(isC(d,x.i))dnc++;});if(d>today&&dnc===0)st='fut';else st=dnc===tsc.length?'full':dnc>0?'part':'miss';}
      }
      cell.className='hday '+st+(sameD(d,today)?' now':'');cell.textContent=d.getDate();daysEl.appendChild(cell);
    }
    row.appendChild(daysEl);hw.appendChild(row);
  }
  body.appendChild(hw);
  if(hist.length){
    var pl=document.createElement('div');pl.className='plbl';pl.textContent='📈 HISTORIQUE';body.appendChild(pl);
    var pp=document.createElement('div');pp.className='ppips';
    hist.forEach(function(h){for(var pi=0;pi<h.exp;pi++){var p=document.createElement('div');p.className='ppip '+(pi<h.done?'hit':'mis');pp.appendChild(p);}});
    body.appendChild(pp);
    var leg=document.createElement('div');leg.className='pleg';
    leg.innerHTML='<span><i style="background:#3b23a8"></i>FAIT</span><span><i style="background:#b0aca4"></i>MANQUÉ</span>';
    body.appendChild(leg);
  }
  var btn=document.createElement('button');btn.className='mclose';btn.textContent='✕ FERMER';btn.onclick=closeModal;body.appendChild(btn);
  document.getElementById('mOverlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('mOverlay').classList.add('hidden');}
document.getElementById('mCloseX').onclick=closeModal;
document.getElementById('mOverlay').onclick=function(e){if(e.target===this)closeModal();};

// RENDERS
function renderWM(){
  var el=document.getElementById('wmGrid');el.innerHTML='';
  var today=new Date();today.setHours(0,0,0,0);var mon=getMon(cur);
  for(var i=0;i<7;i++){(function(){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var D=getDow(d),isT=sameD(d,today),isCC=sameD(d,cur);
    var c=document.createElement('div');c.className='wmc'+(isT?' today':'');
    if(isCC&&!isT){c.style.outline='2px solid #3b23a8';c.style.outlineOffset='-2px';}
    var dots=D?D.s.map(function(_,j){return'<div class="wmdot'+(isC(d,j)?' ok':'')+'"></div>';}).join(''):'<div class="wmdot"></div>';
    c.innerHTML='<span class="wmd">'+DFR[d.getDay()]+'</span><span class="wmn">'+d.getDate()+'</span><div class="wmdots">'+dots+'</div>';
    var dd=new Date(d);c.onclick=function(){cur=new Date(dd);cur.setHours(0,0,0,0);renderAll();};
    el.appendChild(c);
  })();}
}
function renderHdr(){
  document.getElementById('dayName').textContent=DFL[cur.getDay()];
  document.getElementById('dayDate').textContent=fmt(cur);
  var D=getDow(cur),tot=0,done=0;
  if(D){tot=D.s.length;D.s.forEach(function(_,i){if(isC(cur,i))done++;});}
  document.getElementById('dayPct').textContent=done+'/'+tot+' sessions';
  document.getElementById('dayBar').style.width=(tot?Math.round(done/tot*100):0)+'%';
  document.getElementById('gPct').textContent=gPct()+'% PROGRAMME';
}
function renderMain(){
  var el=document.getElementById('main');el.innerHTML='';
  var D=getDow(cur);
  if(!D){
    var r=document.createElement('div');r.className='sess';r.style.cssText='border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;';
    r.innerHTML='<div class="sess-bar" style="background:linear-gradient(90deg,#444,#666)"><span class="sess-bar-l">💤 DIMANCHE</span></div><div class="repos-body"><div class="repos-l">REPOS COMPLET</div><div class="repos-s">RÉCUPÉRATION TOTALE · SNC OFF</div></div>';
    el.appendChild(r);return;
  }
  var tot=D.s.length,done=0,z2=0,hal=0,wod=0;
  D.s.forEach(function(s,i){if(isC(cur,i)){done++;if(s.tp==='zone2')z2++;if(s.tp==='halte')hal++;if(s.tp==='wod')wod++;}});
  var bw=document.createElement('div');bw.style.cssText='margin-bottom:8px;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;';
  bw.innerHTML='<div class="vbar" style="background:linear-gradient(90deg,#3b23a8,#6b5fd4)"><span class="vbar-t">📊 BILAN DU JOUR</span></div><div class="sg"><div class="sb"><div class="sv">'+done+'/'+tot+'</div><div class="sl">FAIT</div></div><div class="sb"><div class="sv" style="color:#8a5e00">'+hal+'</div><div class="sl">HALTÉRO</div></div><div class="sb"><div class="sv">'+z2+'</div><div class="sl">ZONE 2</div></div><div class="sb"><div class="sv" style="color:#880000">'+wod+'</div><div class="sl">WOD</div></div></div>';
  el.appendChild(bw);
  D.s.forEach(function(s,si){(function(sess,idx){
    var checked=isC(cur,idx);
    var card=document.createElement('div');card.className='sess t-'+sess.tp+(checked?' checked':'');
    var bar=document.createElement('div');bar.className='sess-bar';
    var barL=document.createElement('span');barL.className='sess-bar-l';barL.textContent=TLAB[sess.tp];bar.appendChild(barL);
    if(ANAL.indexOf(sess.tp)!==-1){
      var btn=document.createElement('button');btn.className='stats-btn';btn.textContent='📈 STATS';btn.type='button';
      btn.onclick=function(e){e.stopPropagation();openModal(sess.tp);};bar.appendChild(btn);
    }
    card.appendChild(bar);
    var body=document.createElement('div');body.className='sess-body';
    var info=document.createElement('div');info.className='sess-info';
    info.innerHTML='<div class="sess-tag">'+sess.t+'</div><div class="sess-title">'+sess.n+'</div><div class="sess-detail">'+sess.d+'</div>';
    body.appendChild(info);
    var chk=document.createElement('div');chk.className='chk';chk.innerHTML='<span class="chkmark">✓</span>';
    body.appendChild(chk);body.onclick=function(){tog(cur,idx);};
    card.appendChild(body);el.appendChild(card);
  })(s,si);});
  var rule=document.createElement('div');rule.className='sess';rule.style.cssText='margin-top:8px;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;';
  rule.innerHTML='<div class="sess-bar" style="background:linear-gradient(90deg,#444,#666)"><span class="sess-bar-l">ℹ️ RÈGLE D\'OR</span></div><div class="rule-body"><div class="rule-txt">MIN. 6H ENTRE SESSIONS · FORCE TOUJOURS EN PREMIER<br>SI UNE SESSION SAUTE → TOUJOURS CELLE DU SOIR</div></div>';
  el.appendChild(rule);
}
function renderAll(){renderHdr();renderWM();renderMain();}
document.getElementById('btnPrev').onclick=function(){cur=new Date(cur);cur.setDate(cur.getDate()-1);renderAll();};
document.getElementById('btnNext').onclick=function(){cur=new Date(cur);cur.setDate(cur.getDate()+1);renderAll();};

// DRAWER
document.getElementById('drawerFab').onclick=function(){
  document.getElementById('drawerOverlay').classList.remove('hidden');
  renderPRList();
};
document.getElementById('drawerClose').onclick=function(){document.getElementById('drawerOverlay').classList.add('hidden');};
document.getElementById('drawerOverlay').onclick=function(e){if(e.target===this)document.getElementById('drawerOverlay').classList.add('hidden');};
function switchDTab(name){
  document.querySelectorAll('.dtab').forEach(function(t,i){t.classList.toggle('active',['pr','pct','plates'][i]===name);});
  document.querySelectorAll('.dtool').forEach(function(t){t.classList.toggle('active',t.id==='dtool-'+name);});
  if(name==='pr')renderPRList();
}

// PR
var prType='kg';
function setPrType(v){prType=v;document.querySelectorAll('#prTypeGroup .radio-btn').forEach(function(b){b.classList.toggle('active',b.dataset.val===v);});document.getElementById('prUnit').textContent={kg:'KG',reps:'REPS',time:'SEC'}[v];document.getElementById('prVal').step=v==='reps'?'1':'0.25';}
function loadPRs(){try{var s=localStorage.getItem('hygie_prs');return s?JSON.parse(s):{};}catch(e){return {};}}
function savePRs(p){try{localStorage.setItem('hygie_prs',JSON.stringify(p));}catch(e){}}
function savePR(){
  var name=document.getElementById('prName').value.trim().toUpperCase();
  var val=parseFloat(document.getElementById('prVal').value);
  if(!name||isNaN(val)||val<=0){alert('Mouvement et valeur requis.');return;}
  var prs=loadPRs();var now=new Date();var ds=now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();
  if(!prs[name])prs[name]={type:prType,history:[],best:0};
  prs[name].history.unshift({val:val,date:ds,type:prType});
  prs[name].history=prs[name].history.slice(0,20);
  prs[name].best=prs[name].history.reduce(function(m,h){return h.val>m?h.val:m;},0);
  prs[name].type=prType;savePRs(prs);
  document.getElementById('prName').value='';document.getElementById('prVal').value='';renderPRList();
}
function toggleHist(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}
function renderPRList(){
  var el=document.getElementById('prList');if(!el)return;
  var prs=loadPRs();var keys=Object.keys(prs);el.innerHTML='';
  if(!keys.length){var e=document.createElement('div');e.style.cssText='font-size:10px;color:#aaa;text-align:center;padding:16px;';e.textContent='AUCUN PR ENREGISTRÉ';el.appendChild(e);return;}
  keys.forEach(function(name){
    var pr=prs[name];var unit={kg:'kg',reps:'reps',time:'sec'}[pr.type]||'kg';
    var latest=pr.history&&pr.history[0];var safeid='h'+name.replace(/[^a-z0-9]/gi,'_');
    var card=document.createElement('div');card.className='pr-item';
    var top=document.createElement('div');top.style.cssText='display:flex;align-items:center;justify-content:space-between;';
    var info=document.createElement('div');
    var nm=document.createElement('div');nm.className='pr-name';nm.textContent=(latest&&latest.val===pr.best?'🏆 ':'')+name;
    var dt=document.createElement('div');dt.className='pr-date';dt.textContent=latest?latest.date:'';
    info.appendChild(nm);info.appendChild(dt);
    var btns=document.createElement('div');btns.style.cssText='display:flex;align-items:center;gap:6px;flex-shrink:0;';
    var valEl=document.createElement('span');valEl.className='pr-val';valEl.textContent=latest?(latest.val+' '+unit):'-';
    var hBtn=document.createElement('button');hBtn.className='pr-hist-btn';hBtn.textContent='▼';hBtn.type='button';
    (function(sid){hBtn.onclick=function(){toggleHist(sid);};})(safeid);
    var dBtn=document.createElement('button');dBtn.className='pr-del';dBtn.textContent='✕';dBtn.type='button';
    (function(n){dBtn.onclick=function(){var p=loadPRs();delete p[n];savePRs(p);renderPRList();};})(name);
    btns.appendChild(valEl);btns.appendChild(hBtn);btns.appendChild(dBtn);
    top.appendChild(info);top.appendChild(btns);card.appendChild(top);
    var hist=document.createElement('div');hist.className='pr-hist';hist.id=safeid;
    (pr.history||[]).forEach(function(h,i){
      var row=document.createElement('div');row.className='pr-hist-row';
      var l=document.createElement('span');l.textContent=(i===0?'→ ':'  ')+h.val+' '+unit+(h.val===pr.best?' 🏆':'');
      var r=document.createElement('span');r.textContent=h.date;row.appendChild(l);row.appendChild(r);hist.appendChild(row);
    });
    card.appendChild(hist);el.appendChild(card);
  });
}

// PCT
function calcPct(){
  var rm=parseFloat(document.getElementById('pctRM').value);var el=document.getElementById('pctResult');el.innerHTML='';
  if(!rm||rm<=0)return;
  var res=document.createElement('div');res.className='calc-result';
  var title=document.createElement('div');title.className='calc-result-main';title.textContent='1RM = '+rm+' kg';res.appendChild(title);
  var sub=document.createElement('div');sub.className='calc-result-sub';
  [50,55,60,65,70,75,80,82,85,87,90,92,95,97,100].forEach(function(p){
    var v=Math.round(rm*p/100*4)/4;
    var line=document.createElement('div');line.style.cssText='display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #ccc;';
    var lbl=document.createElement('span');lbl.textContent=p+'%';
    var val=document.createElement('strong');val.textContent=v+' kg';
    line.appendChild(lbl);line.appendChild(val);sub.appendChild(line);
  });
  res.appendChild(sub);el.appendChild(res);
}

// PLATES
function calcPlates(){
  var target=parseFloat(document.getElementById('plTarget').value);
  var loaded=parseFloat(document.getElementById('plLoaded').value)||0;
  var el=document.getElementById('plResult');el.innerHTML='';
  if(!target||target<=0)return;
  if(target<loaded&&loaded>0){el.style.cssText='font-size:10px;color:#880000;margin-top:8px;';el.textContent='Cible ('+target+'kg) < poids actuel ('+loaded+'kg).';return;}
  var toAdd=Math.round((target-loaded)*1000)/1000;
  if(toAdd===0){el.innerHTML='<div class="calc-result"><div class="calc-result-main">Rien à ajouter</div></div>';return;}
  var perSide=Math.round(toAdd/2*1000)/1000;
  var available=[20,15,10,5,2.5,1,0.5,0.25];var plates=[];var rem=perSide;
  available.forEach(function(p){while(rem>=p-0.001){plates.push(p);rem=Math.round((rem-p)*1000)/1000;}});
  var res=document.createElement('div');res.className='calc-result';res.style.marginTop='10px';
  var main=document.createElement('div');main.className='calc-result-main';
  if(rem>0.01){main.style.color='#880000';main.textContent='Impossible (manque '+rem+'kg/côté)';res.appendChild(main);el.appendChild(res);return;}
  var finalW=loaded+plates.reduce(function(s,p){return s+p;},0)*2;
  main.textContent=finalW+' kg';res.appendChild(main);
  var info=document.createElement('div');info.className='calc-result-sub';
  info.textContent=(loaded>0?'Actuellement '+loaded+' kg · ':'Barre vide · ')+'À AJOUTER PAR CÔTÉ :';res.appendChild(info);
  var visual=document.createElement('div');visual.className='plates-visual';
  var colors={20:'#3b23a8',15:'#5a1090',10:'#7a5500',5:'#550000',2.5:'#005533',1:'#444',0.5:'#666',0.25:'#888'};
  plates.forEach(function(p){var chip=document.createElement('div');chip.className='plate-chip';chip.style.background=colors[p]||'#555';chip.textContent=p;visual.appendChild(chip);});
  res.appendChild(visual);
  var counts={};plates.forEach(function(p){counts[p]=(counts[p]||0)+1;});
  var summary=Object.keys(counts).sort(function(a,b){return b-a;}).map(function(p){return counts[p]+'x'+p+'kg';}).join(' + ');
  var note=document.createElement('div');note.className='plates-note';note.textContent='PAR COTE : '+summary;res.appendChild(note);
  el.appendChild(res);
}


// INIT
load();cur=new Date();cur.setHours(0,0,0,0);renderAll();
